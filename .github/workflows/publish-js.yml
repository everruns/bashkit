# NPM publishing workflow for bashkit JavaScript package
# Builds native NAPI-RS bindings for all major platforms and publishes to npm.
# Triggered alongside publish.yml on GitHub Release or manual dispatch.
# Adapted from https://github.com/pydantic/monty CI JS-building pattern.
#
# Prerequisites:
#   - NPM_TOKEN secret with publish access (GitHub Settings > Secrets > Actions)
#   - id-token: write permission for npm provenance (OIDC attestation)

name: Publish JS

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "1"
  DEBUG: "napi:*"

jobs:
  # ============================================================================
  # Verify the publish source is on main before running any repo code
  # with secrets. Manual dispatch and release events can target arbitrary
  # refs; this gate ensures all subsequent jobs see trusted code.
  # ============================================================================
  verify-source:
    name: Verify publish source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify publish source is reachable from main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          SOURCE_SHA=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Error: publish source $SOURCE_SHA is not reachable from origin/main"
            exit 1
          fi
          echo "Publish source verified on origin/main: $SOURCE_SHA"

  # ============================================================================
  # Build native bindings for each platform
  # ============================================================================
  build-js:
    name: Build JS - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs: [verify-source]

    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm exec napi build --platform --release --target x86_64-apple-darwin && pnpm run build:cjs && pnpm run build:ts
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm exec napi build --platform --release --target aarch64-apple-darwin && pnpm run build:cjs && pnpm run build:ts
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm exec napi build --platform --release --target x86_64-unknown-linux-gnu --use-napi-cross && pnpm run build:cjs && pnpm run build:ts
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build: pnpm exec napi build --platform --release --target aarch64-unknown-linux-gnu && pnpm run build:cjs && pnpm run build:ts
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm exec napi build --platform --release --target x86_64-pc-windows-msvc && pnpm run build:cjs && pnpm run build:ts
          # TODO: WASM disabled — tokio "full" features (from bashkit core) are
          # unsupported on wasm32. Needs architectural fix to gate tokio features.
          # - host: ubuntu-latest
          #   target: wasm32-wasip1-threads
          #   build: pnpm exec napi build --platform --release --target wasm32-wasip1-threads && pnpm run build:cjs && pnpm run build:ts

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: crates/bashkit-js/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/bashkit-js

      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
        working-directory: crates/bashkit-js

      - name: Upload native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: js-bindings-${{ matrix.settings.target }}
          path: |
            crates/bashkit-js/bashkit.*.node
            crates/bashkit-js/bashkit.*.wasm
          if-no-files-found: error

      # Upload generated JS stubs from one build (they're identical across targets)
      - if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        name: Upload JS stubs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: js-stubs
          path: |
            crates/bashkit-js/browser.js
            crates/bashkit-js/index.cjs
            crates/bashkit-js/index.d.ts
            crates/bashkit-js/index.d.cts
            crates/bashkit-js/wrapper.js
            crates/bashkit-js/wrapper.d.ts
            crates/bashkit-js/bashkit.wasi.cjs
            crates/bashkit-js/bashkit.wasi-browser.js
            crates/bashkit-js/wasi-worker.mjs
            crates/bashkit-js/wasi-worker-browser.mjs
          if-no-files-found: error

  # ============================================================================
  # Test bindings on macOS and Windows
  # ============================================================================
  test-js-macos-windows:
    name: Test JS on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs: [build-js]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
        node: ["20", "22", "24"]
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: crates/bashkit-js/pnpm-lock.yaml
          architecture: ${{ matrix.settings.architecture }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/bashkit-js

      - name: Download native binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-bindings-${{ matrix.settings.target }}
          path: crates/bashkit-js

      - name: Download JS stubs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-stubs
          path: crates/bashkit-js

      - name: Test bindings
        run: pnpm test
        working-directory: crates/bashkit-js

      - name: Run examples
        shell: bash
        run: |
          mkdir -p node_modules/@everruns
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp -r crates/bashkit-js node_modules/@everruns/bashkit
          else
            ln -s ${{ github.workspace }}/crates/bashkit-js node_modules/@everruns/bashkit
          fi
          node examples/bash_basics.mjs
          node examples/data_pipeline.mjs
          node examples/llm_tool.mjs

      - name: Install AI SDK dependencies and re-link
        shell: bash
        run: |
          echo '{"type":"module","private":true}' > package.json
          pnpm add --ignore-scripts openai ai @ai-sdk/openai @langchain/core @langchain/langgraph @langchain/openai zod
          rm -rf node_modules/@everruns/bashkit
          mkdir -p node_modules/@everruns
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp -r crates/bashkit-js node_modules/@everruns/bashkit
          else
            ln -s ${{ github.workspace }}/crates/bashkit-js node_modules/@everruns/bashkit
          fi

      - name: Detect Doppler availability
        id: doppler
        run: echo "available=${{ secrets.DOPPLER_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Install Doppler CLI
        if: steps.doppler.outputs.available == 'true'
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      # `--only-secrets OPENAI_API_KEY` keeps the runtime env scoped to
      # just the key these scripts need, instead of injecting every
      # secret in the Doppler config. DOPPLER_TOKEN stays scoped to this
      # trusted secret-fetch step, not npm install/build/test/example code.
      # Skipped on Windows + Node 24: libuv hits an assertion failure
      # (`!(handle->flags & UV_HANDLE_CLOSING)` in src/win/async.c) during
      # process shutdown of the example scripts on that combination; the
      # same examples pass on every other platform/Node combination.
      - name: Run AI examples
        if: steps.doppler.outputs.available == 'true' && !(runner.os == 'Windows' && matrix.node == '24')
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --only-secrets OPENAI_API_KEY -- node examples/openai_tool.mjs
          doppler run --only-secrets OPENAI_API_KEY -- node examples/vercel_ai_tool.mjs
          doppler run --only-secrets OPENAI_API_KEY -- node examples/langchain_agent.mjs

  # ============================================================================
  # Test bindings on Linux
  # ============================================================================
  test-js-linux:
    name: Test JS ${{ matrix.target }} - node@${{ matrix.node }}
    needs: [build-js]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        node: ["20", "22", "24"]
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: crates/bashkit-js/pnpm-lock.yaml

      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> $GITHUB_OUTPUT
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/bashkit-js

      - name: Download native binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-bindings-${{ matrix.target }}
          path: crates/bashkit-js

      - name: Download JS stubs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-stubs
          path: crates/bashkit-js

      - name: Test bindings
        run: >
          docker run --rm -v ${{ github.workspace }}:${{ github.workspace }}
          -w ${{ github.workspace }}/crates/bashkit-js
          --platform ${{ steps.docker.outputs.PLATFORM }}
          ${{ steps.docker.outputs.IMAGE }}
          ./node_modules/.bin/ava

      - name: Link package for examples
        run: |
          mkdir -p node_modules/@everruns
          ln -s ${{ github.workspace }}/crates/bashkit-js node_modules/@everruns/bashkit

      - name: Run examples
        run: >
          docker run --rm -v ${{ github.workspace }}:${{ github.workspace }}
          -w ${{ github.workspace }}
          --platform ${{ steps.docker.outputs.PLATFORM }}
          ${{ steps.docker.outputs.IMAGE }}
          sh -c "node examples/bash_basics.mjs && node examples/data_pipeline.mjs && node examples/llm_tool.mjs"

      - name: Install AI SDK dependencies and re-link
        run: |
          echo '{"type":"module","private":true}' > package.json
          pnpm add --ignore-scripts openai ai @ai-sdk/openai @langchain/core @langchain/langgraph @langchain/openai zod
          rm -rf node_modules/@everruns/bashkit
          mkdir -p node_modules/@everruns
          ln -s ${{ github.workspace }}/crates/bashkit-js node_modules/@everruns/bashkit

      - name: Detect Doppler availability
        id: doppler
        run: echo "available=${{ secrets.DOPPLER_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Install Doppler CLI
        if: steps.doppler.outputs.available == 'true'
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Run AI examples
        if: steps.doppler.outputs.available == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: >
          docker run --rm -v ${{ github.workspace }}:${{ github.workspace }}
          -w ${{ github.workspace }}
          -e OPENAI_API_KEY=$(doppler secrets get OPENAI_API_KEY --plain)
          --platform ${{ steps.docker.outputs.PLATFORM }}
          ${{ steps.docker.outputs.IMAGE }}
          sh -c "node examples/openai_tool.mjs && node examples/vercel_ai_tool.mjs && node examples/langchain_agent.mjs"

  # ============================================================================
  # Test WASI target — disabled until tokio feature gating is resolved
  # TODO: Re-enable when bashkit core gates tokio "full" behind a feature flag
  # ============================================================================
  # test-js-wasi:
  #   name: Test WASI target
  #   needs: [build-js]
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
  #       with:
  #         version: 10.33.0
  #     - name: Setup node
  #       uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
  #       with:
  #         node-version: 24
  #         cache: pnpm
  #         cache-dependency-path: crates/bashkit-js/pnpm-lock.yaml
  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile --cpu wasm32
  #       working-directory: crates/bashkit-js
  #     - name: Download native binding
  #       uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
  #       with:
  #         name: js-bindings-wasm32-wasip1-threads
  #         path: crates/bashkit-js
  #     - name: Download JS stubs
  #       uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
  #       with:
  #         name: js-stubs
  #         path: crates/bashkit-js
  #     - name: Test bindings
  #       run: pnpm test
  #       env:
  #         NAPI_RS_FORCE_WASI: 1
  #       working-directory: crates/bashkit-js

  # ============================================================================
  # Publish to npm
  # ============================================================================
  release-js:
    name: Release to NPM
    runs-on: ubuntu-latest
    needs:
      - test-js-macos-windows
      - test-js-linux

    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify publish source is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          SOURCE_SHA=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Error: publish source $SOURCE_SHA is not reachable from origin/main"
            exit 1
          fi
          echo "Publish source verified on origin/main: $SOURCE_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: crates/bashkit-js/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/bashkit-js

      - name: Download all native bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: js-bindings-*
          merge-multiple: true
          path: crates/bashkit-js

      - name: Download JS stubs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-stubs
          path: crates/bashkit-js

      - name: List package contents
        run: ls -lh bashkit.*.node bashkit.*.wasm 2>/dev/null || true
        working-directory: crates/bashkit-js

      - name: Determine npm dist-tag
        id: dist-tag
        working-directory: crates/bashkit-js
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION"

          # Only verified release tags may publish as npm latest. Branch or
          # manually selected refs must not become the default install target.
          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
              exit 1
            fi
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: |
          TAG="${{ steps.dist-tag.outputs.tag }}"
          echo "Publishing with dist-tag: $TAG"
          if [ "$TAG" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --tag "$TAG" --access public
          fi
        working-directory: crates/bashkit-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publish
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ steps.dist-tag.outputs.tag }}"
          ATTEMPTS=24
          SLEEP_SECONDS=5

          for attempt in $(seq 1 "$ATTEMPTS"); do
            ACTUAL=$(npm view @everruns/bashkit "dist-tags.$TAG" 2>/dev/null || echo "not found")
            if [ "$ACTUAL" = "$PKG_VERSION" ]; then
              echo "✓ @everruns/bashkit@$ACTUAL published to npm ($TAG)"
              exit 0
            fi

            echo "Attempt $attempt/$ATTEMPTS: expected $PKG_VERSION on npm tag $TAG, got $ACTUAL"
            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "✗ expected $PKG_VERSION on npm tag $TAG after $ATTEMPTS attempts"
          echo "::error::npm publish verification failed"
          exit 1
        working-directory: crates/bashkit-js
