name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    # Only run if manually triggered OR commit message starts with "chore(release): prepare v"
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release): prepare v') }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual releases must be dispatched from protected main; downstream
            # publish workflows intentionally run from the verified release tag.
            if [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "Error: manual releases must be dispatched from refs/heads/main"
              exit 1
            fi
            # Manual trigger: read version from Cargo.toml
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          else
            # Push trigger: extract from first line of commit message
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
            VERSION=$(echo "$FIRST_LINE" | sed -n 's/.*prepare v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]; then
            echo "Error: Commit version (${{ steps.version.outputs.version }}) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Verify release source is on main
        run: |
          git fetch --force origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Error: release source $GITHUB_SHA is not reachable from origin/main"
            exit 1
          fi
          echo "Release source $GITHUB_SHA is reachable from origin/main"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"

          # Get content between this version header and the next version header (or end)
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md
          echo "Release notes extracted for v$VERSION"

      - name: Create and verify release tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Check remote first to avoid stale local refs
          REMOTE_TAG_SHA=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
          if [ -n "$REMOTE_TAG_SHA" ]; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "Error: existing tag $TAG points to $TAG_SHA, expected $GITHUB_SHA"
              exit 1
            fi
            echo "Existing tag $TAG verified at $GITHUB_SHA"
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "Created tag $TAG at $GITHUB_SHA"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      - name: Verify release tag points to this commit
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "Error: release tag $TAG points to $TAG_SHA, expected $GITHUB_SHA"
            exit 1
          fi
          echo "Release tag $TAG verified at $TAG_SHA"

      # Note: the `release: [published]` event does NOT trigger other
      # workflows when the release is created with GITHUB_TOKEN (GitHub
      # prevents recursive workflow triggers). We must dispatch explicitly.
      # Use --ref only after verifying the release tag points at this commit.
      - name: Trigger publish workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh workflow run publish.yml --ref "$TAG"
          gh workflow run publish-python.yml --ref "$TAG"
          gh workflow run publish-js.yml --ref "$TAG"

      - name: Trigger CLI binary builds for release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          echo "Triggering CLI binary builds for tag $TAG..."
          gh workflow run cli-binaries.yml --ref "$TAG" -f "tag=$TAG"
          echo "CLI binary builds triggered for $TAG"
