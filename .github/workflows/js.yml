# JavaScript/TypeScript CI — builds NAPI-RS bindings and runs tests
# Triggered on PRs and pushes to main when JS-related files change.

name: JS

on:
  push:
    branches: [main]
    paths:
      - "crates/bashkit-js/**"
      - "crates/bashkit/src/**"
      - "examples/*.mjs"
      - "examples/package.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/js.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/bashkit-js/**"
      - "crates/bashkit/src/**"
      - "examples/*.mjs"
      - "examples/package.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/js.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

jobs:
  build-and-test:
    name: ${{ matrix.runtime }} ${{ matrix.version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node
            version: "20"
          - runtime: node
            version: "22"
          - runtime: node
            version: "24"
          - runtime: node
            version: "latest"
          - runtime: bun
            version: "latest"
          - runtime: bun
            version: "canary"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}

      - name: Setup Node.js (for napi build)
        if: matrix.runtime == 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}

      - name: Install dependencies
        run: ${{ matrix.runtime }} install
        working-directory: crates/bashkit-js

      - name: Build native binding
        run: ${{ matrix.runtime }} run build
        working-directory: crates/bashkit-js

      - name: Run tests
        run: ${{ matrix.runtime == 'node' && 'npm test' || 'bun run test' }}
        working-directory: crates/bashkit-js

      - name: Install example dependencies and link local build
        working-directory: examples
        run: |
          ${{ matrix.runtime }} install
          rm -rf node_modules/@everruns/bashkit
          mkdir -p node_modules/@everruns
          ln -s ${{ github.workspace }}/crates/bashkit-js node_modules/@everruns/bashkit

      - name: Run examples (self-contained)
        working-directory: examples
        run: |
          ${{ matrix.runtime }} bash_basics.mjs
          ${{ matrix.runtime }} data_pipeline.mjs
          ${{ matrix.runtime }} llm_tool.mjs
          ${{ matrix.runtime }} langchain_integration.mjs

      - name: Install Doppler CLI
        if: env.DOPPLER_TOKEN != ''
        uses: dopplerhq/cli-action@v4

      - name: Run AI examples
        if: env.DOPPLER_TOKEN != ''
        working-directory: examples
        run: |
          doppler run -- ${{ matrix.runtime }} openai_tool.mjs
          doppler run -- ${{ matrix.runtime }} vercel_ai_tool.mjs
          doppler run -- ${{ matrix.runtime }} langchain_agent.mjs

  # Gate job for branch protection
  js-check:
    name: JS Check
    if: always()
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "JS build/test failed"
            exit 1
          fi
