# Initialize NPM Platform Packages
# One-time workflow to create placeholder npm packages for each NAPI target.
# Must be run before the first JS release so platform packages exist on npm.
#
# After running, manually configure Trusted Publishing on npmjs.com for each package:
#   Package Settings > Trusted Publisher > GitHub Actions > everruns/bashkit

name: Initialize NPM Platform Packages

on:
  workflow_dispatch:

jobs:
  init:
    name: Create placeholder packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: crates/bashkit-js/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: crates/bashkit-js

      - name: Create npm dirs
        run: npm run create-npm-dirs
        working-directory: crates/bashkit-js

      - name: Publish placeholder packages
        working-directory: crates/bashkit-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          SUMMARY=""
          for dir in npm/*/; do
            PACKAGE_NAME=$(node -p "require('./${dir}package.json').name")

            # Check if already published
            if npm view "$PACKAGE_NAME" > /dev/null 2>&1; then
              echo "SKIP: $PACKAGE_NAME already exists on npm"
              continue
            fi

            echo "CREATING: $PACKAGE_NAME"

            # Create a temporary placeholder package.json
            ORIGINAL=$(cat "${dir}package.json")
            cat > "${dir}package.json" <<EOF
          {
            "name": "$PACKAGE_NAME",
            "version": "0.0.0",
            "description": "Platform-specific binary for @everruns/bashkit (placeholder)",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/everruns/bashkit"
            }
          }
          EOF

            npm publish "${dir}" --access public || echo "WARNING: Failed to publish $PACKAGE_NAME"

            # Restore original
            echo "$ORIGINAL" > "${dir}package.json"

            SUMMARY="${SUMMARY}\n  - ${PACKAGE_NAME}"
          done

          echo ""
          echo "=== Summary ==="
          if [ -n "$SUMMARY" ]; then
            echo -e "Created packages:${SUMMARY}"
            echo ""
            echo "IMPORTANT: Configure Trusted Publishing on npmjs.com for each package:"
            echo "  Package Settings > Trusted Publisher > GitHub Actions > everruns/bashkit"
          else
            echo "All packages already exist on npm"
          fi
