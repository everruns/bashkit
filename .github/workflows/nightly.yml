name: Nightly

# Heavy analysis jobs — too slow for every PR, run nightly instead.
on:
  schedule:
    # 4 AM UTC daily (after fuzz at 3 AM)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RG_VERSION: 15.1.0

jobs:
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: miri

      - name: Setup Miri
        run: cargo +nightly miri setup

      - name: Run Miri on library tests
        run: |
          cargo +nightly miri test --lib -p bashkit -- \
            --test-threads=1 \
            test_parse_simple_command \
            test_parse_variable \
            test_parse_pipeline
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3
        with:
          tool: cargo-geiger
          locked: true

      - name: Run cargo-geiger (unsafe code audit)
        run: |
          cargo geiger --all-features 2>&1 | tee geiger-report.txt
          echo "::notice::Unsafe code report generated. Review geiger-report.txt for details."
        continue-on-error: true

      - name: Upload geiger report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    # ASAN with --test-threads=1 plus the expanded rg/coreutils
    # differential corpora needs well over the previous 30-minute cap;
    # the last two nightly runs cancelled mid-suite at exactly 30 min.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # `-Z build-std` rebuilds std + every dep + every bashkit test with
      # ASAN instrumentation. Target dir grows past the default runner's
      # ~14-21 GiB free volume; reclaim ~25 GiB of unused tooling first.
      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      # ASAN runs the Rust test suite, including `rg` differential tests.
      - name: Install pinned ripgrep for differential tests
        run: scripts/install-ripgrep-ci.sh "$RG_VERSION"

      - name: Run tests with AddressSanitizer
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          ASAN_OPTIONS: "detect_stack_use_after_return=1:detect_leaks=0"
        run: |
          cargo +nightly test -Z build-std --target x86_64-unknown-linux-gnu --lib --tests \
            -- --test-threads=1
